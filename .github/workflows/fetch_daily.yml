name: Fetch Daily Stock Data

on:
  schedule:
    # Runs at 11:00 UTC = 4:30 PM IST, Mon–Fri (30 min after NSE closes at 3:30 PM IST)
    - cron: '0 11 * * 1-5'

  # Lets you trigger a manual run from the GitHub → Actions tab at any time
  workflow_dispatch:

permissions:
  contents: write   # required to push the updated CSVs back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stock data
        run: python run_daily.py

      # Keeps a downloadable ZIP of today's CSVs for 90 days
      # Access via: GitHub → Actions → (this run) → Artifacts
      - name: Upload CSVs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stock-data-${{ github.run_number }}-${{ github.run_attempt }}
          path: data/*.csv
          retention-days: 90

      # Commit the updated CSVs back to the repo so data/ always has the latest
      - name: Commit updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only create a commit when files actually changed
          git diff --staged --quiet || \
            git commit -m "chore: auto-update stock data $(date -u '+%Y-%m-%d') [skip ci]"
          git push
